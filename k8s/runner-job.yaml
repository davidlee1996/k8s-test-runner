# Kubernetes Job for the Playwright test runner.
#
# Week 2 scope: single pod, single test run. We're proving the pipeline works
# end-to-end before adding parallelism in Week 3.
#
# Why a Job and not a Pod or Deployment:
# - Pod is too low-level for run-once workloads (no restart-on-failure policy at
#   the controller level, no completion tracking).
# - Deployment is for long-running services that should always be up. Tests are
#   the opposite: they run, finish, and exit.
# - Job is purpose-built for "run this to completion exactly once" workloads.
#   It tracks pod completion, retries failed pods up to backoffLimit, and reports
#   a clean success/failure status when done.

apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-runner
  labels:
    app: k8s-test-runner
    phase: "1"
    week: "2"
spec:
  # backoffLimit: 0 means "if the pod fails, mark the Job as failed immediately".
  # We don't want retry-on-failure during development — flaky retries hide problems.
  # Production might bump this to 2-3, but for portfolio demos, fail fast.
  backoffLimit: 0

  # ttlSecondsAfterFinished: clean up the Job (and its pods) 5 minutes after completion.
  # Without this, completed Jobs pile up in the cluster forever and clutter `kubectl get jobs`.
  ttlSecondsAfterFinished: 300

  template:
    metadata:
      labels:
        app: k8s-test-runner
    spec:
      # restartPolicy: Never means a failed pod is NOT restarted in place by the kubelet.
      # The Job controller handles retries (governed by backoffLimit above).
      # This is the standard pattern for batch workloads.
      restartPolicy: Never

      containers:
      - name: runner
        image: k8s-test-runner:dev

        # imagePullPolicy: Never tells K8s not to try pulling from a registry.
        # We loaded the image into Kind with `kind load docker-image`, so it's
        # available locally. In Week 5 (EKS), we'll switch this to IfNotPresent
        # and pull from ECR.
        imagePullPolicy: Never

        # Resource requests/limits are good K8s hygiene even for single-pod runs.
        # - requests: what the scheduler reserves on the node for this pod
        # - limits: hard cap that kicks in if the pod tries to exceed them
        # Playwright + Chromium needs ~500Mi RAM minimum to be reliable.
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"      # 0.25 of a CPU core
          limits:
            memory: "1Gi"
            cpu: "1000m"     # 1 full CPU core

        # Pass the pod name into the container as an env var.
        # The runner doesn't use it yet, but it'll matter in Week 3 when each
        # pod uploads its results to S3 with a unique key.
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name